name: Build mod
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip the project
        run: unzip -o casinohelperplus.zip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build
        working-directory: casinohelperplus
        run: |
          chmod +x gradlew
          ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: casinohelperplus-jar
          path: casinohelperplus/build/libs/*.jar
